# ==============================================================================
# Middle Server - 초기 설정 예시 파일
# ==============================================================================
#
# 이 파일을 'middle.conf' 라는 이름으로 복사한 후, 본인의 환경에 맞게
# 아래 항목들을 수정하여 사용하세요.
#
# 명령어: cp middle-server/config/middle.conf.example middle-server/config/middle.conf
#
# ------------------------------------------------------------------------------

# [1. 터널 전용 사용자]
#
# Middle Server에 생성할, 터널 연결 수신 전용 사용자의 이름을 지정합니다.
# (예: tunnel, tunnel_user 등)
TUNNEL_USER="tunnel"


# ------------------------------------------------------------------------------

# [2. 방화벽에 허용할 포트 목록]
#
# 외부에서 접속할 수 있도록 방화벽(ufw)에서 열어줄 포트 목록을 지정합니다.
# 여러 개를 설정할 경우, 큰따옴표 안에 공백으로 구분하여 나열합니다.
#
# 중요:
#  - Middle Server 자체에 SSH로 접속하기 위한 '관리용 포트'를 반드시 포함해야 합니다.
#  - Target Server의 'tunnel.conf'에 설정할 '외부포트'들을 여기에 모두 포함해야 합니다.
#
# --- 예시 ---
#
# Middle Server 관리용 SSH 포트: 2222
# 터널을 통해 노출할 포트: 22222 (Target Server 접속용), 8080 (웹 서비스용)
#
# TUNNEL_PORTS_TO_OPEN="2222 22222 8080"
#
# ------------------------------------------------------------------------------

# 아래에 실제 사용할 포트 목록을 입력하세요.
TUNNEL_PORTS_TO_OPEN="2222 22222"