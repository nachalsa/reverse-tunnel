# ==============================================================================
# 역방향 SSH 터널 - 상세 설정 예시 파일
# ==============================================================================
#
# 이 파일을 'tunnel.conf' 라는 이름으로 복사한 후, 본인의 환경에 맞게
# 아래 항목들을 수정하여 사용하세요.
#
# 명령어: cp target-server/config/tunnel.conf.example target-server/config/tunnel.conf
#
# ------------------------------------------------------------------------------

# [1. Middle Server 접속 정보]
#
# Middle Server에 접속하기 위한 정보를 입력합니다.
# 이 정보는 Target Server의 '~/.ssh/config' 파일에 설정된 내용과 일치해야 합니다.

# MIDDLE_SERVER_IP:
#   ~/.ssh/config 파일에 설정한 'Host' 별칭(alias)을 입력하세요.
#   (예: pitunnel)
MIDDLE_SERVER_IP="pitunnel"

# MIDDLE_SERVER_USER:
#   ~/.ssh/config 파일에 설정한 'User' 이름을 입력하세요.
#   (예: tunnel)
MIDDLE_SERVER_USER="tunnel"


# ------------------------------------------------------------------------------

# [2. 생성할 터널 목록] (가장 중요한 설정!)
#
# "외부포트:내부IP:내부포트" 형식의 터널을 설정합니다.
# 여러 개를 설정할 경우, 큰따옴표 안에 공백으로 구분하여 나열합니다.
#
# - 외부포트: 외부 PC에서 Middle Server에 접속할 때 사용할 포트.
#             (Middle Server의 방화벽에서 허용된 포트여야 합니다.)
#
# - 내부IP:   Target Server가 바라보는 목적지 IP.
#             'localhost' 또는 '127.0.0.1'은 Target Server 자기 자신을 의미합니다.
#
# - 내부포트: 내부IP를 가진 장비에서 실제로 서비스되고 있는 포트.
#
# --- 사용 시나리오별 예시 ---
#
# 예시 1: 이 Target Server에 SSH로 접속하고 싶을 때 (가장 일반적)
#         -> 외부에서 'ssh -p 22222 user@pitunnel'로 접속
# TUNNELS="22222:localhost:22"
#
# 예시 2: 이 Target Server의 웹 서버(80번 포트)를 외부에 노출하고 싶을 때
#         -> 외부 브라우저에서 'http://<pitunnel_ip>:8080'으로 접속
# TUNNELS="8080:localhost:80"
#
# 예시 3: 사설망의 다른 장비(예: NAS, 192.168.0.100)의 관리 페이지(5000번)에 접속하고 싶을 때
#         -> 외부 브라우저에서 'http://<pitunnel_ip>:55000'으로 접속
# TUNNELS="55000:192.168.0.100:5000"
#
# 예시 4: 여러 터널을 동시에 사용하고 싶을 때
# TUNNELS="22222:localhost:22 8080:localhost:80 55000:192.168.0.100:5000"
#
# ------------------------------------------------------------------------------

# 아래에 실제 사용할 터널 설정을 입력하세요.
# ssh 접속을 위한 터널 설정 # mstsc 접속을 위한 터널 설정
TUNNELS="8001:localhost:22 8009:localhost:3389"
